<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip of the Day Widget</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root{
        --primary:#2e7d32;
        --bg:#f4f7f2;
        --card-bg:#ffffff;
        --border:#e0e0e0;
        --shadow:0 4px 15px rgba(0,0,0,0.08);
    }
    body{
        font-family:'Segoe UI', sans-serif;
        background:var(--bg);
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        margin:0;
        padding:20px;
    }

    /* ===== TIP OF THE DAY WIDGET ===== */
    .tip-container{
        background:var(--card-bg);
        border-radius:24px;
        padding:25px;
        box-shadow:var(--shadow);
        max-width:420px;
        width:100%;
    }
    .tip-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:15px;
    }
    .time-badge-large{
        display:flex;
        align-items:center;
        gap:8px;
        background:var(--bg);
        border:1px solid var(--border);
        padding:6px 14px;
        border-radius:20px;
        font-weight:600;
        color:var(--primary);
        font-size:0.9rem;
    }
    .tip-number-badge{
        background:linear-gradient(135deg,#f9a825,#f57f17);
        color:white;
        padding:6px 14px;
        border-radius:20px;
        font-weight:700;
        font-size:0.85rem;
    }
    .tip-text{
        font-size:1.1rem;
        line-height:1.6;
        color:#333;
    }
    .tip-text::before{
        content:"🌱 ";
    }
    /* ===== END WIDGET ===== */
</style>
</head>
<body>

<div class="tip-container" data-aos="fade-up">
    <div class="tip-header">
        <div class="time-badge-large">
            <i class="far fa-clock"></i>
            <span id="current-time">00:00:00</span>
        </div>
        <div class="tip-number-badge" id="tip-number">#01</div>
    </div>
    <div class="tip-text" id="tip-of-the-day">Loading daily tip...</div>
</div>

<script src="script.js"></script>
</body>
</html>
